name: Release

# Triggered by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the manifest commit and create the release

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — it can push back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so we can push back to main
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Strip the leading 'v' from the tag: v1.2.3 → 1.2.3
      - name: Parse version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Patch the version in the csproj so the assembly carries it
      - name: Stamp version into csproj
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" \
            Jellyfin.Plugin.StorageManager.csproj
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${VERSION}.0</AssemblyVersion>|" \
            Jellyfin.Plugin.StorageManager.csproj

      - name: Build
        run: dotnet publish --configuration Release --output ./artifacts --nologo

      # Jellyfin verifies the MD5 of the downloaded file before installing
      - name: Compute MD5 checksum
        id: checksum
        run: |
          md5=$(md5sum artifacts/Jellyfin.Plugin.StorageManager.dll | awk '{print $1}')
          echo "md5=$md5" >> "$GITHUB_OUTPUT"

      # Prepend the new version entry to manifest.json so newest is always first
      - name: Update manifest.json
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          CHECKSUM: ${{ steps.checksum.outputs.md5 }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.0000000Z")
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/Jellyfin.Plugin.StorageManager.dll"

          python3 - <<PYEOF
          import json, os

          with open("manifest.json") as f:
              data = json.load(f)

          new_version = {
              "version": os.environ["VERSION"] + ".0",
              "changelog": "See the GitHub release notes for details.",
              "targetAbi": "10.9.0.0",
              "sourceUrl": os.environ["SOURCE_URL"],
              "checksum": os.environ["CHECKSUM"],
              "timestamp": os.environ["TIMESTAMP"],
          }

          # Newest version first
          data[0]["versions"].insert(0, new_version)

          with open("manifest.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PYEOF
        env:
          SOURCE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Jellyfin.Plugin.StorageManager.dll
          TIMESTAMP: ${{ steps.ver.outputs.version }}

      # Commit the updated manifest back to main so the raw GitHub URL stays current
      - name: Commit manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json Jellyfin.Plugin.StorageManager.csproj
          git commit -m "chore: release ${{ github.ref_name }}"
          git push origin HEAD:main

      # Create the GitHub Release and attach the DLL
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Jellyfin.Plugin.StorageManager.dll
          generate_release_notes: true
