name: Release

# Triggered by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # Strip the leading 'v' from the tag: v1.2.3 → 1.2.3
      - name: Parse version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Patch the version in the csproj so the assembly carries it
      - name: Stamp version into csproj
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" \
            Jellyfin.Plugin.StorageManager.csproj
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${VERSION}.0</AssemblyVersion>|" \
            Jellyfin.Plugin.StorageManager.csproj

      - name: Build
        run: dotnet publish --configuration Release --output ./artifacts --nologo

      # Jellyfin 10.11+ requires a zip archive, not a bare DLL
      - name: Package into zip
        run: |
          cd artifacts
          zip Jellyfin.Plugin.StorageManager.zip Jellyfin.Plugin.StorageManager.dll
          cd ..

      # Jellyfin verifies the MD5 of the zip before installing
      - name: Compute MD5 checksum
        id: checksum
        run: |
          md5=$(md5sum artifacts/Jellyfin.Plugin.StorageManager.zip | awk '{print $1}')
          echo "md5=$md5" >> "$GITHUB_OUTPUT"

      # Prepend the new version entry to manifest.json so newest is always first
      - name: Update manifest.json
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          CHECKSUM="${{ steps.checksum.outputs.md5 }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Jellyfin.Plugin.StorageManager.zip"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.0000000Z")

          jq \
            --arg v  "${VERSION}.0" \
            --arg url "$SOURCE_URL" \
            --arg cs  "$CHECKSUM" \
            --arg ts  "$TIMESTAMP" \
            '.[0].versions = [{
              version:   $v,
              changelog: "See the GitHub release notes for details.",
              targetAbi: "10.11.0.0",
              sourceUrl: $url,
              checksum:  $cs,
              timestamp: $ts
            }] + .[0].versions' \
            manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      # Commit the updated manifest back to main so the raw GitHub URL stays current.
      # Rebase onto the current remote main first — main may have moved forward
      # after the tag was pushed (e.g. a fix commit landed between tag and workflow run).
      - name: Commit manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json Jellyfin.Plugin.StorageManager.csproj
          git commit -m "chore: release ${{ github.ref_name }}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      # Create the GitHub Release and attach the zip
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/Jellyfin.Plugin.StorageManager.zip
          generate_release_notes: true
