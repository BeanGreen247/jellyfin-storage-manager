name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.StorageManager
          path: ./artifacts/Jellyfin.Plugin.StorageManager.dll

      - name: Attach DLL to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/Jellyfin.Plugin.StorageManager.dll
